name: Cypress E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: cypress-binary-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Install Cypress binary
        run: pnpm cypress install

      - name: Start dev server and API, run Cypress
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: pnpm dev, pnpm dev:api
          wait-on: 'http://localhost:5173, http://localhost:3001/flowers'
          wait-on-timeout: 60
          command: pnpm cypress:run

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
